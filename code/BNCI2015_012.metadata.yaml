file_format: gdf
methodology: 'Participants performed a single session lasting 3-4 hours consisting of calibration phase and online spelling
  task. Calibration: 3 runs (plus 1 practice run), each with 9 trials covering all 9 stimuli as targets. Each trial had 13-14
  pseudo-random sequences of all 9 auditory stimuli (108 subtrials total, 12 target + 96 non-target). Online spelling: 2 runs
  spelling German sentences using T9-style predictive text system with 9-class decisions. Each trial consisted of 135 subtrials
  (15 iterations of 9 stimuli). Binary classification using linear FDA with shrinkage regularization on 2-4 amplitude values
  per channel from discriminative intervals (N200 at 230-300ms and P300 at 350+ ms). Multiclass decision based on one-sided
  t-test with unequal variances across 15 classifier outputs per key.'
